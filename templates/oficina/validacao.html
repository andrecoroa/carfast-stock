{% extends "base.html" %}{% block content %}<h2>Validação administrativa — {{ p.numero_impro }}</h2><form method="post"><label><input type="checkbox" name="fo_fechada" {% if val and val.fo_fechada %}checked{% endif %}> FO fechada</label><label><input type="checkbox" name="diagnostico_pos_anexado" {% if val and val.diagnostico_pos_anexado %}checked{% endif %}> Diagnóstico pós concluído/anexado</label><label><input type="checkbox" name="ficha_viatura_atualizada" {% if val and val.ficha_viatura_atualizada %}checked{% endif %}> Ficha da viatura atualizada</label><label><input type="checkbox" name="parametros_atualizados" {% if val and val.parametros_atualizados %}checked{% endif %}> Parâmetros/revisão atualizados</label><label><input type="checkbox" name="documentacao_completa" {% if val and val.documentacao_completa %}checked{% endif %}> Documentação completa</label><label>Validado por <input name="validado_por" value="{{ val.validado_por if val else '' }}"></label><label>Observações <textarea name="observacoes">{{ val.observacoes if val else '' }}</textarea></label><button>Guardar validação</button></form><p>O processo só fecha quando todos os pontos estiverem validados.</p>{% endblock %}
