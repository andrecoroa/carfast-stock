{% extends "base.html" %}{% block content %}<h2>Receção / ServiceBox — {{ p.numero_impro }}</h2><form method="post" enctype="multipart/form-data"><label><input type="checkbox" name="servicebox_verificado" {% if r and r.servicebox_verificado %}checked{% endif %}> ServiceBox verificado</label><label><input type="checkbox" name="campanhas_verificadas" {% if r and r.campanhas_verificadas %}checked{% endif %}> Campanhas verificadas</label><label><input type="checkbox" name="campanhas_pendentes" {% if r and r.campanhas_pendentes %}checked{% endif %}> Existem campanhas pendentes</label><label>Plano manutenção verificado<select name="plano_manutencao_verificado"><option>Não</option><option>Sim</option><option>Não aplicável</option></select></label><label><input type="checkbox" name="historico_oem_verificado" {% if r and r.historico_oem_verificado %}checked{% endif %}> Histórico OEM verificado</label><label>Observações <textarea name="observacoes">{{ r.observacoes if r else '' }}</textarea></label><label>Anexos ServiceBox / prints / PDF <input type="file" name="anexos" multiple></label><button>Guardar receção</button></form>{% endblock %}
