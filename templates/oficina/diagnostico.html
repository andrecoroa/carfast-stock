{% extends "base.html" %}{% block content %}<h2>Diagnóstico {{ tipo }} — {{ p.numero_impro }} / {{ p.matricula }}</h2><form method="post" enctype="multipart/form-data"><label>Data diagnóstico <input name="data_diagnostico" type="datetime-local"></label><label>KM diagnóstico <input name="km_diagnostico" type="number"></label><h3>Parâmetros comparáveis</h3><label>Nº manutenções ECU <input name="n_manutencoes_ecu" placeholder="ex: 0 → 1"></label><label>Intervenções reais <input name="intervencoes_reais" placeholder="ex: 7, 2 oficinas"></label><label>Telecarregamento <input name="telecarregamento" placeholder="ex: OK / Não até 2026"></label><label>Última manutenção registada <input name="ultima_manutencao_registada"></label><label>Manutenção não registada <input name="manutencao_nao_registada"></label><label>Km manutenção anterior <input name="km_manutencao_anterior" type="number"></label><label>Km até manutenção <input name="km_ate_manutencao" type="number"></label><label>Diluição óleo (%) <input name="diluicao_oleo" type="number" step="0.01"></label><label>Carbono óleo (%) <input name="carbono_oleo" type="number" step="0.01"></label><h3>Análise técnica</h3><label>Problema identificado <textarea name="problema_identificado"></textarea></label><label>Causa provável <textarea name="causa_provavel"></textarea></label><label>Intervenção recomendada <textarea name="intervencao_recomendada"></textarea></label><label>Oficina recomendada<select name="oficina_recomendada"><option>Interna</option><option>Externa</option><option>Marca</option></select></label><label>Pode circular?<select name="pode_circular"><option>Sim</option><option>Não</option><option>Limitado</option></select></label><label>Prioridade<select name="prioridade"><option>Normal</option><option>Urgente</option><option>Imobilizante</option></select></label><label>Inconsistências encontradas <textarea name="inconsistencias"></textarea></label><label>Observações <textarea name="observacoes"></textarea></label><label>Anexos diagnóstico / Autel / prints <input type="file" name="anexos" multiple></label><button>Guardar diagnóstico</button></form>{% endblock %}
