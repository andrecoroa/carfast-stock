{% extends "base.html" %}
{% block content %}

<div class="page-head">
  <h2>Novo Incidente Frota</h2>
  <a class="button secondary" href="{{ url_for('incidentes_frota') }}">Voltar</a>
</div>

<form method="post" enctype="multipart/form-data">
  <div class="grid">
    <label>Matrícula <input name="matricula" required placeholder="AA-00-AA"></label>
    <label>Categoria
      <select name="categoria_id" required>
        {% for c in categorias %}
          <option value="{{ c.id }}">{{ c.nome }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Classificação
      <select name="classificacao_id" required>
        {% for c in classificacoes %}
          <option value="{{ c.id }}">{{ c.categoria_nome }} — {{ c.nome }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Gravidade
      <select name="gravidade">
        {% for g in gravidades %}
          <option value="{{ g }}" {% if g == 'Média' %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Faturável
      <select name="faturavel">
        {% for f in faturaveis %}
          <option value="{{ f }}" {% if f == 'A avaliar' %}selected{% endif %}>{{ f }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Valor estimado <input name="valor_estimado" type="number" step="0.01"></label>
    <label>Processo ID <input name="processo_id"></label>
    <label>Contrato <input name="contrato_id"></label>
    <label>Cliente <input name="cliente"></label>
    <label>Oficina / Marca <input name="oficina_marca"></label>
    <label>Origem <input name="origem" placeholder="Frota, Oficina, Rentway, Cliente..."></label>
    <label>Responsável follow-up <input name="responsavel_followup"></label>
    <label>Data limite <input name="data_limite" type="datetime-local"></label>
    <label>Criado por <input name="criado_por"></label>
  </div>

  <label class="check-option">
    <input type="checkbox" name="criar_tarefa" id="criarTarefaIncidente" checked>
    Criar tarefa de follow-up no Centro de Tarefas
  </label>

  <label>Descrição do incidente
    <textarea name="descricao" required></textarea>
  </label>
  <label>Ação necessária
    <textarea name="acao_necessaria"></textarea>
  </label>
  <label>Anexos
    <input type="file" name="anexos" multiple>
  </label>

  <button>Criar incidente</button>
</form>

<script>
  const classificacoesIncidente = {
    {% for c in classificacoes %}
      "{{ c.id }}": {{ 1 if c.gera_tarefa else 0 }}{% if not loop.last %},{% endif %}
    {% endfor %}
  };
  const selectClassificacao = document.querySelector('select[name="classificacao_id"]');
  const criarTarefa = document.getElementById('criarTarefaIncidente');

  function aplicarDefaultTarefa() {
    if (!selectClassificacao || !criarTarefa) return;
    criarTarefa.checked = Boolean(classificacoesIncidente[selectClassificacao.value]);
  }

  if (selectClassificacao && criarTarefa) {
    aplicarDefaultTarefa();
    selectClassificacao.addEventListener('change', aplicarDefaultTarefa);
  }
</script>

{% endblock %}
