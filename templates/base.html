<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>CarFast Hub Operacional</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
  <h1>CarFast — Hub Operacional</h1>
  <nav>
    <a href="{{ url_for('home') }}">Início</a>
    <a href="{{ url_for('stock_home') }}">📦 Gestão de Stock</a>
    <a href="{{ url_for('manutencao_home') }}">🔧 Gestão de Manutenção</a>
  </nav>
</header>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
