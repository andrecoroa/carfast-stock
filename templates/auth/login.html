{% extends "base.html" %}
{% block content %}

<div class="auth-panel">
  <h2>Login CarFast</h2>
  <p class="muted">Acesso protegido ao hub operacional.</p>
  <form method="post">
    <label>Email
      <input name="email" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button>Entrar</button>
  </form>
  <p class="muted">Admin inicial: {{ default_email }} / {{ default_password }}</p>
</div>

{% endblock %}
