services:
  - type: web
    name: carfast-stock
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --capture-output --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_PATH
        value: /opt/render/project/src/storage/stock.db
      - key: UPLOAD_DIR_PATH
        value: /opt/render/project/src/storage/uploads
